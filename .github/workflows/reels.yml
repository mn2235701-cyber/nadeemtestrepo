name: Auto Reel Generator

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build Docker
        run: docker build -t reel-bot .

      - name: Run Bot
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PAGE_ID: ${{ secrets.PAGE_ID }}
          FACEBOOK_ACCESS_TOKEN: ${{ secrets.FACEBOOK_ACCESS_TOKEN }}
        run: |
          docker run \
            -e PEXELS_API_KEY \
            -e PAGE_ID \
            -e FACEBOOK_ACCESS_TOKEN \
            -v ${{ github.workspace }}:/app \
            reel-bot

      - name: Commit State
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add reels/ || true
          git add *.json || true
          git add keywords.txt || true
          git add titles.txt || true
          git add descriptions.txt || true
          git add music/ || true

          git commit -m "auto state update" || echo "no changes"

          git push
